<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">

<defs>
  <style>
    .bg { fill: #f7f4ef; }
    .ink { fill: #1f1f1f; font-family: Arial, Helvetica, sans-serif; }
    .muted { fill: #666; font-family: Arial, Helvetica, sans-serif; }
    .box { fill: #ffffff; stroke: #1f1f1f; stroke-width: 2; rx: 16; }
    .line { stroke: #1f1f1f; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .soft { fill: #e8e0d2; stroke: #1f1f1f; stroke-width: 1.5; rx: 12; }
    .accent { fill: #d9c7a3; stroke: #1f1f1f; stroke-width: 2; rx: 12; }
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1f1f1f" />
  </marker>
</defs>

<rect class="bg" width="1200" height="800"/>
<text class="ink" x="600" y="80" text-anchor="middle" font-size="44" font-weight="700">The Attention Cycle</text>
<text class="muted" x="600" y="125" text-anchor="middle" font-size="22">Every production decision returns to listening</text>

<rect class="box" x="465" y="170" width="270" height="80"/>
<text class="ink" x="600" y="220" text-anchor="middle" font-size="28" font-weight="700">Listen</text>

<rect class="box" x="790" y="330" width="270" height="80"/>
<text class="ink" x="925" y="380" text-anchor="middle" font-size="28" font-weight="700">Observe</text>

<rect class="box" x="465" y="500" width="270" height="80"/>
<text class="ink" x="600" y="550" text-anchor="middle" font-size="28" font-weight="700">Decide</text>

<rect class="box" x="140" y="330" width="270" height="80"/>
<text class="ink" x="275" y="380" text-anchor="middle" font-size="28" font-weight="700">Act</text>

<path class="line" d="M720 230 C820 250 890 285 915 330"/>
<path class="line" d="M925 410 C900 470 810 520 735 540"/>
<path class="line" d="M465 540 C380 520 305 470 280 410"/>
<path class="line" d="M275 330 C305 260 390 225 465 210"/>

<text class="muted" x="600" y="680" text-anchor="middle" font-size="24">Do not solve before you have listened.</text>
</svg>
