<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">

<defs>
  <style>
    .bg { fill: #f7f4ef; }
    .ink { fill: #1f1f1f; font-family: Arial, Helvetica, sans-serif; }
    .muted { fill: #666; font-family: Arial, Helvetica, sans-serif; }
    .box { fill: #ffffff; stroke: #1f1f1f; stroke-width: 2; rx: 16; }
    .line { stroke: #1f1f1f; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .soft { fill: #e8e0d2; stroke: #1f1f1f; stroke-width: 1.5; rx: 12; }
    .accent { fill: #d9c7a3; stroke: #1f1f1f; stroke-width: 2; rx: 12; }
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1f1f1f" />
  </marker>
</defs>

<rect class="bg" width="1200" height="800"/>
<text class="ink" x="600" y="80" text-anchor="middle" font-size="44" font-weight="700">The Decision Loop</text>
<text class="muted" x="600" y="125" text-anchor="middle" font-size="22">A disciplined alternative to habitual production</text>

<rect class="box" x="90" y="330" width="180" height="90"/>
<text class="ink" x="180" y="385" text-anchor="middle" font-size="28" font-weight="700">Listen</text>

<rect class="box" x="310" y="330" width="180" height="90"/>
<text class="ink" x="400" y="385" text-anchor="middle" font-size="28" font-weight="700">Observe</text>

<rect class="box" x="530" y="330" width="180" height="90"/>
<text class="ink" x="620" y="385" text-anchor="middle" font-size="28" font-weight="700">Decide</text>

<rect class="box" x="750" y="330" width="180" height="90"/>
<text class="ink" x="840" y="385" text-anchor="middle" font-size="28" font-weight="700">Act</text>

<rect class="box" x="970" y="330" width="180" height="90"/>
<text class="ink" x="1060" y="370" text-anchor="middle" font-size="25" font-weight="700">Listen</text>
<text class="ink" x="1060" y="400" text-anchor="middle" font-size="25" font-weight="700">Again</text>

<path class="line" d="M270 375 L310 375"/>
<path class="line" d="M490 375 L530 375"/>
<path class="line" d="M710 375 L750 375"/>
<path class="line" d="M930 375 L970 375"/>

<text class="muted" x="600" y="560" text-anchor="middle" font-size="24">Make one change. Listen before making the next.</text>
</svg>
