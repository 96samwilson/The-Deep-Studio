<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">

<defs>
  <style>
    .bg { fill: #f7f4ef; }
    .ink { fill: #1f1f1f; font-family: Arial, Helvetica, sans-serif; }
    .muted { fill: #666; font-family: Arial, Helvetica, sans-serif; }
    .box { fill: #ffffff; stroke: #1f1f1f; stroke-width: 2; rx: 16; }
    .line { stroke: #1f1f1f; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .soft { fill: #e8e0d2; stroke: #1f1f1f; stroke-width: 1.5; rx: 12; }
    .accent { fill: #d9c7a3; stroke: #1f1f1f; stroke-width: 2; rx: 12; }
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1f1f1f" />
  </marker>
</defs>

<rect class="bg" width="1200" height="800"/>
<text class="ink" x="600" y="80" text-anchor="middle" font-size="44" font-weight="700">Four Timescales of Movement</text>
<text class="muted" x="600" y="125" text-anchor="middle" font-size="22">Hypnotic music changes on multiple clocks</text>

<rect class="accent" x="120" y="190" width="960" height="85"/>
<text class="ink" x="170" y="242" font-size="28" font-weight="700">Micro</text>
<text class="muted" x="420" y="242" font-size="24">milliseconds–2 seconds</text>
<text class="ink" x="780" y="242" font-size="22">drift, grain variation, flutter</text>

<rect class="soft" x="120" y="310" width="960" height="85"/>
<text class="ink" x="170" y="362" font-size="28" font-weight="700">Short</text>
<text class="muted" x="420" y="362" font-size="24">10–30 seconds</text>
<text class="ink" x="780" y="362" font-size="22">filter, delay tone, width</text>

<rect class="soft" x="120" y="430" width="960" height="85"/>
<text class="ink" x="170" y="482" font-size="28" font-weight="700">Medium</text>
<text class="muted" x="420" y="482" font-size="24">1–3 minutes</text>
<text class="ink" x="780" y="482" font-size="22">density, ambience, saturation</text>

<rect class="accent" x="120" y="550" width="960" height="85"/>
<text class="ink" x="170" y="602" font-size="28" font-weight="700">Structural</text>
<text class="muted" x="420" y="602" font-size="24">whole piece</text>
<text class="ink" x="780" y="602" font-size="22">journey, pacing, emotional arc</text>
</svg>
